,'à®¤à¯†à®³à®¿à®µà¯à®®à¯ à®•à®Ÿà¯à®Ÿà¯à®ªà¯à®ªà®¾à®Ÿà¯à®®à¯ à®•à¯Šà®£à¯à®Ÿ à®¨à®¿à®¤à®¿ à®¨à®¿à®°à¯à®µà®¾à®•à®®à¯')}</p><div className="splash-line"></div></div></div>}<aside className="side"><div className="brand"><img className="brand-logo" src="../vairam fincorp.png" alt="Vairam Fincorp logo" /></div><div className="nav">{NAV.map(([key,icon])=><button key={key} type="button" className={page===key?'on':''} onClick={()=>setPage(key)}><span className="icon">{icon}</span><span>{copy.nav[key]}</span></button>)}</div><div className="card" style={{marginTop:18}}><div className="fld"><label>{copy.common.language}</label><select value={language} onChange={(e)=>setLanguage(e.target.value)}><option value="en">English</option><option value="ta">Tamil</option></select></div><button className="btn sec" type="button" style={{width:'100%',marginTop:12}} onClick={loadCustomers}>{copy.common.refresh}</button></div></aside><main className="main"><div className="mobile-shell"><div className="mobile-brand"><img src="../vairam fincorp.png" alt="Vairam Fincorp logo" /><div><strong>VAIRAM FINCORP</strong><small>{copy.nav[page]}</small></div></div><div className="mobile-tabs">{NAV.map(([key])=><button key={key} type="button" className={page===key?'on':''} onClick={()=>setPage(key)}>{copy.nav[key]}</button>)}</div><div className="mobile-tools"><div className="row"><div className="fld"><label>{copy.common.language}</label><select value={language} onChange={(e)=>setLanguage(e.target.value)}><option value="en">English</option><option value="ta">Tamil</option></select></div><button className="btn sec" type="button" onClick={loadCustomers}>{copy.common.refresh}</button></div></div></div><ErrorBoundary>{pages[page]||pages.dashboard}</ErrorBoundary></main><nav className="mnav">{NAV.map(([key,icon])=><button key={key} type="button" className={page===key?'on':''} onClick={()=>setPage(key)}><span>{icon}</span><span>{copy.nav[key]}</span></button>)}</nav><div className="toastw">{toasts.map((item)=><div key={item.id} className={`toast ${item.type||''}`}><strong>{item.title}</strong>{item.body&&<small>{item.body}</small>}</div>)}</div></div>}
    ReactDOM.createRoot(document.getElementById('root')).render(<AppShell />)
